<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
</head>
<body>
    <div. >
        <h1>Calculadora</h1>
    </div>
    <div>
        <form id="calculadora-form">
            <input type="number"  id="num1" placeholder="Numero 1" required>
            <br>
            <input type="number"  id="num2" placeholder="Numero 2" required>
            <br>
            <select  id="operador">
                <option value="sum">Sumar (+)</option>
                <option value="rest">Restar (-)</option>
                <option value="mul">Multiplicar (*)</option>
                <option value="div">Dividir (/)</option>
            </select>
            <button type="submit">Calcular</button>
        </form>
        <div id="resultado" >

        </div>
    </div>
</body>
<script src="app.js"></script>
</html>
